<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2D Car Game</title>

<style>
body{
    margin:0;
    overflow:hidden;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    background:#222;
    font-family:Arial;
}

#gameArea{
    width:400px;
    height:700px;
    background:#444;
    position:relative;
    overflow:hidden;
    border:5px solid white;
}

.line{
    position:absolute;
    width:10px;
    height:100px;
    background:white;
    left:195px;
}

/* PLAYER CAR */
#car{
    width:65px;
    height:120px;
    position:absolute;
    bottom:20px;
    left:170px;
    background:linear-gradient(to bottom,#ff2a2a,#990000);
    border-radius:15px;
    box-shadow:0 4px 10px rgba(0,0,0,0.6);
}

#car::before{
    content:"";
    position:absolute;
    width:42px;
    height:28px;
    background:#111;
    top:12px;
    left:11px;
    border-radius:8px;
}

#car::after{
    content:"";
    position:absolute;
    width:50px;
    height:8px;
    background:linear-gradient(to right,yellow,orange,yellow);
    bottom:8px;
    left:7px;
    border-radius:4px;
}

#wheelLeft,#wheelRight{
    position:absolute;
    width:8px;
    height:25px;
    background:#111;
    top:30px;
    border-radius:3px;
}
#wheelLeft{left:-4px;}
#wheelRight{right:-4px;}

/* ENEMY CAR */
.enemy{
    width:65px;
    height:120px;
    background:linear-gradient(to bottom,#00aaff,#003355);
    position:absolute;
    border-radius:15px;
}

.enemy::before{
    content:"";
    position:absolute;
    width:42px;
    height:28px;
    background:#111;
    top:12px;
    left:11px;
    border-radius:8px;
}

/* SCORE */
#scoreBoard{
    position:absolute;
    top:10px;
    left:10px;
    color:white;
    z-index:10;
    font-size:18px;
}

/* PAUSE */
#pauseBtn{
    position:absolute;
    top:10px;
    right:10px;
    padding:8px 14px;
    background:#ffaa00;
    border:none;
    border-radius:6px;
    cursor:pointer;
    font-weight:bold;
}

/* GAME OVER */
#gameOver{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    text-align:center;
    color:white;
    display:none;
}

#restartBtn{
    margin-top:15px;
    padding:10px 20px;
    background:#ff3333;
    color:white;
    border:none;
    border-radius:6px;
    cursor:pointer;
}
</style>
</head>

<body>

<div id="gameArea">

<button id="pauseBtn">Pause</button>

<div id="scoreBoard">
Score: <span id="score">0</span><br>
Best: <span id="bestScore">0</span><br>
Lives: <span id="lives">3</span> ❤️
</div>

<div id="car">
<div id="wheelLeft"></div>
<div id="wheelRight"></div>
</div>

<div id="gameOver">
<h1>GAME OVER</h1>
<button id="restartBtn">Start Again</button>
</div>

</div>

<script>
const gameArea=document.getElementById("gameArea");
const car=document.getElementById("car");

const scoreText=document.getElementById("score");
const bestText=document.getElementById("bestScore");
const livesText=document.getElementById("lives");

const gameOverBox=document.getElementById("gameOver");
const restartBtn=document.getElementById("restartBtn");
const pauseBtn=document.getElementById("pauseBtn");

const crashSound=new Audio("https://actions.google.com/sounds/v1/impacts/crash.ogg");
const pointSound=new Audio("https://actions.google.com/sounds/v1/cartoon/wood_plank_flicks.ogg");

let keys={}, enemies=[], lines=[];
let score=0,bestScore=0;
let lives=3;
let running=true;
let paused=false;

/* SPEED */
let roadSpeed=6;
let enemySpeed=2;
let carSpeed=6;

/* EASY GAP */
let enemyGap = 200;

document.addEventListener("keydown",e=>keys[e.key]=true);
document.addEventListener("keyup",e=>keys[e.key]=false);

/* pause */
pauseBtn.addEventListener("click",()=>{
    if(!running) return;
    paused=!paused;
    pauseBtn.innerText=paused?"Resume":"Pause";
    if(!paused) gameLoop();
});

/* road lines */
function createLines(){
    lines.forEach(l=>l.remove());
    lines=[];
    for(let i=0;i<7;i++){
        let line=document.createElement("div");
        line.classList.add("line");
        line.y=i*120;
        line.style.top=line.y+"px";
        gameArea.appendChild(line);
        lines.push(line);
    }
}

/* BETTER ENEMY SPAWN */
function createEnemy(){

    if(enemies.length>0){
        let lastEnemy=enemies[enemies.length-1];
        if(lastEnemy.y > -enemyGap){
            return;
        }
    }

    let enemy=document.createElement("div");
    enemy.classList.add("enemy");

    enemy.x=Math.floor(Math.random()*3)*130+10;
    enemy.y=-120;

    enemy.style.left=enemy.x+"px";
    enemy.style.top=enemy.y+"px";

    gameArea.appendChild(enemy);
    enemies.push(enemy);
}

/* collision */
function collide(a,b){
    let ar=a.getBoundingClientRect();
    let br=b.getBoundingClientRect();

    return !(ar.bottom < br.top ||
             ar.top > br.bottom ||
             ar.right < br.left ||
             ar.left > br.right);
}

/* hit */
function hitEnemy(enemy,index){
    crashSound.play();
    enemy.remove();
    enemies.splice(index,1);

    lives--;
    livesText.innerText=lives;

    if(lives<=0){
        running=false;
        gameOverBox.style.display="block";
        if(score>bestScore){
            bestScore=score;
            bestText.innerText=bestScore;
        }
    }
}

/* restart */
function resetGame(){
    enemies.forEach(e=>e.remove());
    enemies=[];
    score=0;
    lives=3;
    paused=false;

    scoreText.innerText=score;
    livesText.innerText=lives;
    pauseBtn.innerText="Pause";

    car.style.left="170px";
    gameOverBox.style.display="none";
    running=true;

    gameLoop();
}
restartBtn.addEventListener("click",resetGame);

/* loop */
function gameLoop(){
    if(!running || paused) return;

    let left=car.offsetLeft;

    if(keys["ArrowLeft"] && left>10)
        car.style.left=left-carSpeed+"px";

    if(keys["ArrowRight"] && left<325)
        car.style.left=left+carSpeed+"px";

    lines.forEach(line=>{
        line.y+=roadSpeed;
        if(line.y>700) line.y=-100;
        line.style.top=line.y+"px";
    });

    enemies.forEach((enemy,index)=>{
        enemy.y+=enemySpeed;
        enemy.style.top=enemy.y+"px";

        if(collide(car,enemy)){
            hitEnemy(enemy,index);
        }

        if(enemy.y>700){
            pointSound.play();
            enemy.remove();
            enemies.splice(index,1);
            score++;
            scoreText.innerText=score;
        }
    });

    if(Math.random()<0.03){
        createEnemy();
    }

    requestAnimationFrame(gameLoop);
}

createLines();
gameLoop();
</script>
</body>
</html>
